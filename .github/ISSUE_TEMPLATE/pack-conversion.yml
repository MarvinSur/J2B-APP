name: Pack Conversion Request
description: Submit a Java resource pack for conversion to Bedrock format.
title: "[Conversion] "
labels:
  - conversion
body:
  - type: markdown
    attributes:
      value: |
        ## Java → Bedrock Conversion Request
        Please fill in all required fields. The converter will run automatically once this issue is labeled `conversion`.

  - type: input
    id: java-pack-direct-download-url
    attributes:
      label: Java Pack Direct Download URL
      description: A **direct download link** to your Java resource pack `.zip` file (e.g. from Google Drive, Dropbox, GitHub releases, etc.)
      placeholder: https://example.com/mypack.zip
    validations:
      required: true

  - type: input
    id: default-pack-direct-download-url
    attributes:
      label: Default Assets Direct Download URL
      description: |
        Direct download link to a vanilla Minecraft Java assets `.zip` for fallback textures/models.
        Leave blank to use the default version specified below.
      placeholder: https://example.com/default_assets.zip
    validations:
      required: false

  - type: input
    id: bedrock-merge-pack-direct-download-url
    attributes:
      label: Bedrock Merge Pack Direct Download URL
      description: |
        Optional — a Bedrock `.mcpack` to merge with the converted output.
      placeholder: https://example.com/existing_bedrock.mcpack
    validations:
      required: false

  - type: input
    id: default-assets-version
    attributes:
      label: Default Assets Version
      description: Minecraft Java version string for the fallback assets cache.
      placeholder: "1.19.3"
      value: "1.19.3"
    validations:
      required: false

  - type: dropdown
    id: block-material
    attributes:
      label: Block Material
      description: Material to use for converted block models.
      options:
        - alpha_test
        - blend
        - double_sided
      default: 0
    validations:
      required: false

  - type: dropdown
    id: attachable-material
    attributes:
      label: Attachable Material
      description: Material to use for attachable (held item) models.
      options:
        - entity_alphatest_one_sided
        - entity_alphatest
        - entity_emissive_alpha_one_sided
      default: 0
    validations:
      required: false

  - type: dropdown
    id: archive-scratch-files
    attributes:
      label: Archive Scratch Files
      description: Include intermediate scratch files in the output artifact (useful for debugging).
      options:
        - "false"
        - "true"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: rename-model-files
    attributes:
      label: Rename Model Files
      description: Rename output model files to use hash-based names.
      options:
        - "false"
        - "true"
      default: 0
    validations:
      required: false
