name: Build Electron App

on:
  push:
    branches: [main]

jobs:
  # ── 1. Bump version & create tag ────────────────────────────────────────────
  version:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version & push tag
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "v1.0.0")
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Bumping $LATEST → $NEW_TAG"

          cd app
          npm version $NEW_TAG --no-git-tag-version --allow-same-version 2>/dev/null || true
          cd ..

          git add app/package.json
          git commit -m "chore: bump version to $NEW_TAG [skip ci]" || true
          git tag $NEW_TAG
          git push origin HEAD:main
          git push origin $NEW_TAG

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  # ── 2. Create GitHub Release ONCE before builds ──────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.result == 'success'
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    permissions:
      contents: write
    steps:
      - name: Create release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.version.outputs.new_tag }}';
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `J2B Converter ${tag}`,
              body: `Release ${tag}`,
              draft: false,
              prerelease: false,
            });
            core.setOutput('release_id', release.data.id);

  # ── 3. Build Windows ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [version, create-release]
    if: needs.version.result == 'success' && needs.create-release.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install app deps
        working-directory: app
        run: npm install

      - name: Build & Publish Windows
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2B-Converter-Windows
          path: app/dist/*.exe
          retention-days: 7

  # ── 4. Build Linux ───────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [version, create-release]
    if: needs.version.result == 'success' && needs.create-release.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --fix-missing libvips-dev rpm fakeroot

      - name: Install root deps
        run: npm install

      - name: Install app deps
        working-directory: app
        run: npm install

      - name: Build & Publish Linux
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2B-Converter-Linux
          path: app/dist/*.AppImage
          retention-days: 7

  # ── 5. Build macOS ───────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: [version, create-release]
    if: needs.version.result == 'success' && needs.create-release.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install app deps
        working-directory: app
        run: npm install

      - name: Build & Publish macOS
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2B-Converter-macOS
          path: |
            app/dist/*.dmg
            app/dist/*.zip
          retention-days: 7
