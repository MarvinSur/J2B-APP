name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, windows, linux, mac]

jobs:
  # ── Bump version & create tag on every push to main ────────────────────────
  version:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version & push tag
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get latest tag, default v1.0.0
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "v1.0.0")
          echo "Latest tag: $LATEST"

          # Parse semver
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New tag: $NEW_TAG"

          # Update version in app/package.json
          cd app
          npm version $NEW_TAG --no-git-tag-version --allow-same-version 2>/dev/null || true
          cd ..

          git add app/package.json
          git commit -m "chore: bump version to $NEW_TAG [skip ci]" || true
          git tag $NEW_TAG
          git push origin HEAD:main
          git push origin $NEW_TAG

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  # ── Build Windows ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    if: |
      always() && (
        needs.version.result == 'success' ||
        github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Install app deps
        working-directory: app
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Verify icons
        run: ls app/renderer/assets/

      - name: Build Windows installer
        working-directory: app
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2B-Converter-Windows
          path: app/dist/*.exe
          retention-days: 7

  # ── Build Linux ───────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version
    if: |
      always() && (
        needs.version.result == 'success' ||
        github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'linux')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --fix-missing libvips-dev rpm fakeroot

      - name: Install root deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Install app deps
        working-directory: app
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Build Linux AppImage
        working-directory: app
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2B-Converter-Linux
          path: app/dist/*.AppImage
          retention-days: 7

  # ── Build macOS ───────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: version
    if: |
      always() && (
        needs.version.result == 'success' ||
        github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'mac')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Install app deps
        working-directory: app
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Build macOS DMG
        working-directory: app
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2B-Converter-macOS
          path: app/dist/*.dmg
          retention-days: 7

  # ── Create GitHub Release with all binaries ────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-windows, build-linux, build-mac]
    if: |
      always() &&
      needs.version.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-linux.result == 'success' || needs.build-mac.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: J2B Converter ${{ needs.version.outputs.new_tag }}
          generate_release_notes: true
          files: |
            release-files/*.exe
            release-files/*.AppImage
            release-files/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}
