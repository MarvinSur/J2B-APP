name: Conversion Request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - labeled

jobs:
  get-pack-info:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'conversion'
    permissions:
      issues: read
    timeout-minutes: 2
    outputs:
      pack_url:               ${{ steps.organize-inputs.outputs.PACK_URL }}
      default_pack_url:       ${{ steps.organize-inputs.outputs.DEFAULT_PACK_URL }}
      merge_pack_url:         ${{ steps.organize-inputs.outputs.MERGE_PACK_URL }}
      default_assets_version: ${{ steps.organize-inputs.outputs.DEFAULT_ASSETS_VERSION }}
      block_material:         ${{ steps.organize-inputs.outputs.BLOCK_MATERIAL }}
      attachable_material:    ${{ steps.organize-inputs.outputs.ATTACHABLE_MATERIAL }}
      archive_scratch:        ${{ steps.organize-inputs.outputs.ARCHIVE_SCRATCH }}
      rename_model_files:     ${{ steps.organize-inputs.outputs.RENAME_MODEL_FILES }}

    steps:
      - name: Issue Forms Body Parser
        id: parse-issue
        uses: zentered/issue-forms-body-parser@v1.5.1

      - name: Organize Inputs
        id: organize-inputs
        run: |
          echo ${{ toJSON(steps.parse-issue.outputs.data) }} | jq '
          def test_input($input; $default):
            if ($input == "*No response*" or $input == "None") then $default
            else ($input | tostring | gsub("\\\\";"")) end;
          {
            "pack_url":               .["java-pack-direct-download-url"].text[1:-1],
            "default_pack_url":       test_input(.["default-pack-direct-download-url"].text; " null ")[1:-1],
            "merge_pack_url":         test_input(.["bedrock-merge-pack-direct-download-url"].text; " null ")[1:-1],
            "default_assets_version": test_input(.["default-assets-version"].text; "1.19.3"),
            "block_material":         test_input(.["block-material"].text; "alpha_test"),
            "attachable_material":    test_input(.["attachable-material"].text; "entity_alphatest_one_sided"),
            "archive_scratch":        test_input(.["archive-scratch-files"].text; "false"),
            "rename_model_files":     test_input(.["rename-model-files"].text; "false")
          }' > inputs.json
          echo "PACK_URL=$(jq -r '.pack_url' inputs.json)"                             >> $GITHUB_OUTPUT
          echo "DEFAULT_PACK_URL=$(jq -r '.default_pack_url' inputs.json)"             >> $GITHUB_OUTPUT
          echo "MERGE_PACK_URL=$(jq -r '.merge_pack_url' inputs.json)"                 >> $GITHUB_OUTPUT
          echo "DEFAULT_ASSETS_VERSION=$(jq -r '.default_assets_version' inputs.json)" >> $GITHUB_OUTPUT
          echo "BLOCK_MATERIAL=$(jq -r '.block_material' inputs.json)"                 >> $GITHUB_OUTPUT
          echo "ATTACHABLE_MATERIAL=$(jq -r '.attachable_material' inputs.json)"       >> $GITHUB_OUTPUT
          echo "ARCHIVE_SCRATCH=$(jq -r '.archive_scratch' inputs.json)"               >> $GITHUB_OUTPUT
          echo "RENAME_MODEL_FILES=$(jq -r '.rename_model_files' inputs.json)"         >> $GITHUB_OUTPUT

  convert-pack:
    runs-on: ubuntu-latest
    needs: get-pack-info
    permissions:
      contents: read
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache default assets
        uses: actions/cache@v4
        with:
          path: staging/default_assets.zip
          key: ${{ runner.os }}-default-assets-${{ needs.get-pack-info.outputs.default_assets_version }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix APT sources
        run: |
          sudo sed -i 's|mirror+file:/etc/apt/apt-mirrors.txt|http://archive.ubuntu.com/ubuntu|' /etc/apt/sources.list 2>/dev/null || true
          sudo apt-get clean
          sudo apt-get update

      - name: Install system dependencies
        run: |
          sudo apt-get install -y --fix-missing \
            moreutils \
            zip \
            imagemagick \
            ghostscript \
            python3-pip \
            python-is-python3 \
            uuid-runtime \
            curl \
            jq \
            libgbm-dev \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libpango-1.0-0 \
            libcairo2
          yarn global add spritesheet-js
          pip3 install --quiet --break-system-packages Pillow
          echo "--- versions ---"
          jq --version
          convert --version | head -1
          spritesheet-js --version 2>&1 || true
          python --version
          node --version

      - name: Install Node dependencies
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: |
          npm install
          node -e "require('puppeteer'); console.log('puppeteer OK')"
          node -e "require('three');     console.log('three OK')"

      - name: Convert Pack
        env:
          PACK_URL:               ${{ needs.get-pack-info.outputs.pack_url }}
          DEFAULT_PACK_URL:       ${{ needs.get-pack-info.outputs.default_pack_url }}
          MERGE_PACK_URL:         ${{ needs.get-pack-info.outputs.merge_pack_url }}
          DEFAULT_ASSETS_VERSION: ${{ needs.get-pack-info.outputs.default_assets_version }}
          BLOCK_MATERIAL:         ${{ needs.get-pack-info.outputs.block_material }}
          ATTACHABLE_MATERIAL:    ${{ needs.get-pack-info.outputs.attachable_material }}
          ARCHIVE_SCRATCH:        ${{ needs.get-pack-info.outputs.archive_scratch }}
          RENAME_MODEL_FILES:     ${{ needs.get-pack-info.outputs.rename_model_files }}
          PUPPETEER_CACHE_DIR:    /home/runner/.cache/puppeteer
          SOUNDS_CONVERSION:      "true"
          MEG3_FIX:               "false"
          ARMOR_CONVERSION:       "true"
          FONT_CONVERSION:        "true"
          BOW_CONVERSION:         "true"
          SHIELD_CONVERSION:      "true"
          BLOCK_CONVERSION:       "true"
        run: |
          mkdir -p staging

          cp converter.sh   staging/
          cp manager.py     staging/
          cp render_icon.js staging/
          cp sound.py       staging/
          cp meg3.py        staging/
          cp blank256.png   staging/ 2>/dev/null || true
          cp blocks.py      staging/ 2>/dev/null || true
          cp blocks_util.py staging/ 2>/dev/null || true
          cp bow.py         staging/ 2>/dev/null || true
          cp bow_util.py    staging/ 2>/dev/null || true
          cp shield.py      staging/ 2>/dev/null || true
          cp font.py        staging/ 2>/dev/null || true
          cp font_sprite.py staging/ 2>/dev/null || true
          cp -r node_modules staging/

          cd staging
          chmod +x converter.sh

          curl --no-styled-output -#L -o input_pack.zip "${PACK_URL}"

          if [ "${MERGE_PACK_URL}" != "null" ]; then
            curl --no-styled-output -#L -o merge_pack.zip "${MERGE_PACK_URL}"
            MERGE_ARG="-m merge_pack.zip"
          else
            MERGE_ARG=""
          fi

          ./converter.sh input_pack.zip \
            -w "false" \
            ${MERGE_ARG} \
            -a ${ATTACHABLE_MATERIAL} \
            -b ${BLOCK_MATERIAL} \
            -f ${DEFAULT_PACK_URL} \
            -v ${DEFAULT_ASSETS_VERSION} \
            -r ${RENAME_MODEL_FILES} \
            -s ${ARCHIVE_SCRATCH} \
            -u "true"

      - name: Upload converted pack
        uses: actions/upload-artifact@v4
        with:
          name: Pack Files
          path: |
            staging/target/packaged/geyser_resources.mcpack
            staging/target/geyser_mappings.json
            staging/target/scratch_files.zip
            staging/config.json

  post-result:
    runs-on: ubuntu-latest
    needs: convert-pack
    timeout-minutes: 2
    permissions:
      issues: write
    steps:
      - name: Post Result
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## ✅ Conversion finished!

            Download your pack from the [action run page][1]:

            - `geyser_resources.mcpack` → upload to your Geyser `packs/` folder
            - `geyser_mappings.json` → upload to your Geyser `custom_mappings/` folder

            [1]: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          reactions: rocket

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}

  conversion-failed:
    runs-on: ubuntu-latest
    needs: [get-pack-info, convert-pack, post-result]
    if: |
      always() && (
        needs.get-pack-info.result == 'failure' ||
        needs.convert-pack.result  == 'failure'
      )
    timeout-minutes: 2
    permissions:
      issues: write
    steps:
      - name: Post Failure
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## ❌ Conversion failed

            Check the [action run page][1] for the full error log.

            **Job status:**
            - Get Pack Info: `${{ needs.get-pack-info.result }}`
            - Convert Pack:  `${{ needs.convert-pack.result }}`

            [1]: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          reactions: '-1'

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
